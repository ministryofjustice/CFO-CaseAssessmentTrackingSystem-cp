apiVersion: apps/v1
kind: Deployment
metadata:
  name: cats-deployment
  labels:
    app: cats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cats # this should match the selector in service.yml
  template:
    metadata:
      labels:
        app: cats # this should match the selector in service.yml
    spec:
      serviceAccountName: ${NAMESPACE}
      containers:
        - name: cats
          image: ${REGISTRY}/${REPOSITORY}:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: rds-mssql-instance-output
                  key: rds_instance_address
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rds-mssql-instance-output
                  key: database_username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-mssql-instance-output
                  key: database_password
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: ec-cluster-output
                  key: endpoint_address
            - name: REDIS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ec-cluster-output
                  key: auth_token
            - name: S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: s3-bucket-output
                  key: bucket_name
            - name: DOTNET_ENVIRONMENT
              value: "Development"
            - name: ConnectionStrings__CatsDb
              value: "Server=$(DATABASE_ADDRESS);Database=CatsDb;User Id=$(DATABASE_USERNAME);Password=$(DATABASE_PASSWORD);TrustServerCertificate=True;"
            - name: ConnectionStrings__Redis
              value: "$(REDIS_ADDRESS):6379,password=$(REDIS_AUTH_TOKEN),ssl=true"
            - name: UseDummyCandidateService
              value: "true"
            - name: AWS__Bucket
              value: "$(S3_BUCKET_NAME)"
            - name: MassTransit__Transport
              value: "AmazonSqs"
              # Sentry
            - name: SENTRY__DSN
              value: $"(SENTRY_DSN)"
            - name: SENTRY__ENVIRONMENT
              value: $"(NAMESPACE)"